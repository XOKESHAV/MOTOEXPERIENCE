<script>
        // Particle/Spark Animation
        function createSparks() {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 50; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                
                const startX = Math.random() * window.innerWidth;
                const startY = Math.random() * window.innerHeight;
                const tx = (Math.random() - 0.5) * 400;
                const ty = (Math.random() - 0.5) * 400;
                const duration = 2 + Math.random() * 3;
                const delay = Math.random() * 5;

                spark.style.left = `${startX}px`;
                spark.style.top = `${startY}px`;
                spark.style.setProperty('--tw-translate-x', `${tx}px`);
                spark.style.setProperty('--tw-translate-y', `${ty}px`);
                spark.style.animation = `spark-fly ${duration}s linear ${delay}s infinite`;
                
                container.appendChild(spark);
            }
        }

        // Countdown Logic
        function startCountdown() {
            const display = document.getElementById('countdown-number');
            const content = document.getElementById('hero-content');
            let count = 3;

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    display.innerText = count;
                    display.classList.remove('animate-pulse');
                    void display.offsetWidth; // Trigger reflow
                    display.classList.add('animate-pulse');
                } else if (count === 0) {
                    display.innerText = "GO";
                    display.classList.add('text-tertiary', 'glitch-text');
                    setTimeout(() => {
                        display.parentElement.classList.add('hidden');
                        content.classList.remove('opacity-0', 'translate-y-10');
                    }, 500);
                    clearInterval(interval);
                }
            }, 1000);
        }

        // Mouse Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const bg = document.getElementById('parallax-bg');
            const x = (e.clientX - window.innerWidth / 2) / 50;
            const y = (e.clientY - window.innerHeight / 2) / 50;
            bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });

        // Rev Bar Animation (Visualizing Engine Sound)
        const revBar = document.getElementById('rev-bar');
        const startBtn = document.getElementById('start-btn');
        let revving = false;

        startBtn.addEventListener('mouseenter', () => {
            revving = true;
            animateRev();
        });

        startBtn.addEventListener('mouseleave', () => {
            revving = false;
            revBar.style.width = '0%';
        });

        function animateRev() {
            if (!revving) return;
            const target = 70 + Math.random() * 30;
            revBar.style.width = `${target}%`;
            setTimeout(() => {
                if (revving) {
                    revBar.style.width = `${target - 5}%`;
                    setTimeout(animateRev, 50);
                }
            }, 100);
        }

        // Init
        window.onload = () => {
            createSparks();
            setTimeout(startCountdown, 500);
        };
    </script>
